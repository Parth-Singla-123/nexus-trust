name: Fraud Detection CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  model-test-and-convert:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-research

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ml-research/requirements.txt
            ml-research/requirements-convert.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-convert.txt

      - name: Train model with accuracy gate
        run: |
          python train.py

      - name: Run pytest validation gate
        run: |
          pytest -q tests

      - name: Convert model to TensorFlow.js
        run: |
          python convert.py

      - name: Upload edge model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfjs-model
          path: edge-ui/public/models

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: model-test-and-convert
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download edge model artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfjs-model
          path: edge-ui/public/models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for edge-ui
        id: meta-edge
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-edge-ui
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata for spark-engine
        id: meta-spark
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-spark-engine
          tags: |
            type=raw,value=latest
            type=sha

      - name: Docker metadata for analytics-r
        id: meta-analytics
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-analytics-r
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build Edge UI Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./edge-ui
          push: true
          tags: ${{ steps.meta-edge.outputs.tags }}
          labels: ${{ steps.meta-edge.outputs.labels }}

      - name: Build Spark Engine Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./spark-engine
          push: true
          tags: ${{ steps.meta-spark.outputs.tags }}
          labels: ${{ steps.meta-spark.outputs.labels }}

      - name: Build Analytics R Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./analytics-r
          push: true
          tags: ${{ steps.meta-analytics.outputs.tags }}
          labels: ${{ steps.meta-analytics.outputs.labels }}
